function b2b(b64){const s=atob(b64),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function open_(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2b(SALT),iterations:ITER,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2b(IV)},key,b2b(CT));
  return new TextDecoder().decode(buf);
}
async function go(){
  const pw=document.getElementById("pw").value.trim();
  const err=document.getElementById("err");
  err.textContent="";
  if(!pw){err.textContent="請輸入密碼";return;}
  try{
    const html=await open_(pw);
    document.open();document.write(html);document.close();
  }catch(e){err.textContent="密碼錯誤，請再試一次 🙈";}
}
